name: Build and Deploy

on:
  push:
    branches: [ "main", "stage" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine Docker Tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "docker_tag=latest" >> $GITHUB_OUTPUT
          else
            echo "docker_tag=stage" >> $GITHUB_OUTPUT
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/indian-address:${{ steps.tag.outputs.docker_tag }}

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Determine Docker Tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "docker_tag=latest" >> $GITHUB_OUTPUT
            echo "container_name=indian-address-prod" >> $GITHUB_OUTPUT
            echo "ip_address=172.25.0.12" >> $GITHUB_OUTPUT
          else
            echo "docker_tag=stage" >> $GITHUB_OUTPUT
            echo "container_name=indian-address-stage" >> $GITHUB_OUTPUT
            echo "ip_address=172.25.0.13" >> $GITHUB_OUTPUT
          fi

      - name: Pull and restart container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/indian-address:${{ steps.tag.outputs.docker_tag }}

          docker stop ${{ steps.tag.outputs.container_name }} || true
          docker rm ${{ steps.tag.outputs.container_name }} || true

          docker run -d \
            --name ${{ steps.tag.outputs.container_name }} \
            --restart unless-stopped \
            --network custom_bridge \
            --ip ${{ steps.tag.outputs.ip_address }} \
            -p 8282:8282 \
            ${{ secrets.DOCKERHUB_USERNAME }}/indian-address:${{ steps.tag.outputs.docker_tag }}

          sleep 5
          docker ps | grep ${{ steps.tag.outputs.container_name }}
