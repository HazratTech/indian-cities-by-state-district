name: Python CI/CD Workflow

on:
  push:
    branches: [ "main", "stage" ]
  pull_request:
    branches: [ "main", "stage" ]

jobs:
  test-classic-api:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic requests
        
    - name: Test JSON API availability
      run: |
        # Run app in background and verify it responds
        uvicorn main:app --host 0.0.0.0 --port 8282 &
        sleep 3
        curl -f http://localhost:8282/states || exit 1

  test-postgres-api:
    if: github.ref == 'refs/heads/stage'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: address_db
          POSTGRES_USER: address_user
          POSTGRES_PASSWORD: address_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Alembic Migrations
      env:
        DATABASE_URL: postgresql+asyncpg://address_user:address_pass@localhost:5432/address_db
      run: alembic upgrade head
      
    - name: Seed Database
      env:
        DATABASE_URL: postgresql+asyncpg://address_user:address_pass@localhost:5432/address_db
      run: python -m ingestion.seed_json
      
    - name: Test PostgreSQL API
      env:
        DATABASE_URL: postgresql+asyncpg://address_user:address_pass@localhost:5432/address_db
      run: |
        uvicorn app.main:app --host 0.0.0.0 --port 8282 &
        sleep 5
        curl -f http://localhost:8282/api/v1/health || exit 1
